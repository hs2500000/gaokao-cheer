<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🎓 江冠铖 高考加油！</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#fdf5e6}
body{
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;
  display:flex;justify-content:center;align-items:center;
  touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
}
.container{width:100%;max-width:420px;height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;padding:6px 10px;position:relative;overflow-y:auto;overflow-x:hidden}

/* ── 呐喊气泡 ── */
.shout-bubble{
  position:fixed;z-index:350;pointer-events:none;
  font-size:22px;font-weight:900;color:#d63031;
  animation:shoutUp 2s ease-out forwards;
  text-shadow:0 0 10px rgba(255,215,0,.8),2px 2px 0 rgba(0,0,0,.1);
  white-space:nowrap;
}
@keyframes shoutUp{
  0%{opacity:1;transform:translate(-50%,0) scale(.5)}
  15%{opacity:1;transform:translate(-50%,-20px) scale(1.2)}
  40%{opacity:1;transform:translate(-50%,-60px) scale(1)}
  100%{opacity:0;transform:translate(-50%,-160px) scale(.8)}
}

/* ── 墙体 ── */
.wall{position:absolute;top:0;left:0;width:100%;height:42%;background:linear-gradient(180deg,#fdf5e6,#f5e6d3,transparent);z-index:0}

/* ── 黑板 ── */
.blackboard{
  position:relative;z-index:1;width:88%;padding:5px 8px;
  background:linear-gradient(180deg,#2d5016,#1a300b);
  border:4px solid #8B6914;border-radius:6px;
  text-align:center;margin-top:4px;
  box-shadow:0 4px 15px rgba(0,0,0,.3),inset 0 1px 3px rgba(255,255,255,.1);
}
.bb-title{color:#fff;font-size:12px;font-weight:bold;letter-spacing:3px;display:block}
.bb-countdown{color:#ffd700;font-size:18px;font-weight:900;letter-spacing:4px;margin:1px 0;display:block}
.bb-sub{color:#a8e6cf;font-size:10px;letter-spacing:2px;display:block}

/* ── 成绩单 ── */
.scoreboard{
  position:relative;z-index:3;display:flex;gap:6px;margin-top:5px;
  background:rgba(255,255,255,.85);border-radius:12px;padding:6px 10px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);flex-wrap:wrap;justify-content:center;
}
.score-item{text-align:center;min-width:50px}
.score-subject{font-size:10px;color:#636e72;display:block}
.score-value{font-size:16px;font-weight:900;color:#b2bec3;transition:all .5s ease;display:block}
.score-value.up{color:#00b894;animation:scoreBump .5s ease}
.score-value.gold{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.6)}
@keyframes scoreBump{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.score-total{width:100%;text-align:center;margin-top:2px;font-size:11px;color:#d63031;font-weight:bold}
.score-total .st-num{font-size:18px;color:#d63031;transition:all .5s ease}
.score-total .st-num.up{color:#ffd700;animation:scoreBump .5s ease}

/* ── 语音开关 ── */
.voice-toggle{
  position:absolute;top:6px;right:8px;z-index:20;
  background:rgba(255,255,255,.7);border:none;border-radius:50%;
  width:32px;height:32px;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-appearance:none;outline:none;
}

/* ── 加油人条 ── */
.player-bar{
  position:relative;z-index:3;display:flex;align-items:center;gap:6px;
  margin-top:4px;background:rgba(255,255,255,.7);border-radius:20px;padding:3px 12px;
}
.player-label{font-size:10px;color:#795548}
.player-name{font-size:12px;font-weight:900;color:#d63031}
.player-change{font-size:9px;background:#e17055;color:#fff;border:none;padding:2px 8px;border-radius:10px;cursor:pointer;-webkit-appearance:none}
.leaderboard-toggle{font-size:9px;background:#00b894;color:#fff;border:none;padding:2px 8px;border-radius:10px;cursor:pointer;-webkit-appearance:none}

/* ── 标题 ── */
.header{position:relative;z-index:2;text-align:center;margin-bottom:1px}
.title{font-size:18px;font-weight:900;color:#5D4037;text-shadow:1px 1px 0 rgba(255,255,255,.5)}
.subtitle{font-size:10px;color:#6D4C41}

/* ── 主角 ── */
.hero-zone{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;margin:3px 0}
.hero-desk{position:relative;width:160px;height:110px;display:flex;flex-direction:column;align-items:center;transition:all .3s}
.hero-desk.shake{animation:heroShake .45s ease}
@keyframes heroShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px) rotate(-1deg)}50%{transform:translateX(5px) rotate(1deg)}75%{transform:translateX(-2px)}}
.desk{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:130px;height:10px;background:linear-gradient(180deg,#c9a96e,#a07828);border-radius:3px;box-shadow:0 4px 8px rgba(0,0,0,.3)}
.desk::after{content:'';position:absolute;bottom:-22px;left:7px;width:6px;height:22px;background:#8B6914;box-shadow:90px 0 0 #8B6914}
.hero-body{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;z-index:3}
.hero-face{font-size:44px;display:block;transition:all .4s ease;animation:faceBounce 2s ease-in-out infinite}
@keyframes faceBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.hero-face.celebrate{animation:celebrateJump .3s ease 3}
@keyframes celebrateJump{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-15px) scale(1.2)}}
.hero-name{font-size:13px;font-weight:900;color:#2d3436;background:rgba(255,255,255,.85);padding:1px 8px;border-radius:10px;margin-top:-4px}
.hero-tag{font-size:8px;color:#636e72;background:rgba(255,215,0,.5);padding:0 5px;border-radius:6px;margin-top:1px}
.books{position:absolute;bottom:10px;right:16px;z-index:2}
.book{position:absolute;border-radius:2px}
.book1{width:24px;height:4px;background:#e17055;bottom:0;right:0}
.book2{width:22px;height:4px;background:#0984e3;bottom:5px;right:1px}
.book3{width:26px;height:4px;background:#00b894;bottom:10px;right:-2px}
.paper{position:absolute;bottom:10px;left:12px;width:34px;height:22px;background:#fffef5;border-radius:2px;z-index:1;box-shadow:0 1px 3px rgba(0,0,0,.2);transform:rotate(-8deg)}
.paper::after{content:'100?';position:absolute;top:3px;left:5px;font-size:7px;color:#d63031;font-weight:bold}

/* ── 加油能量条 ── */
.cheer-bar{display:flex;align-items:center;gap:3px;margin-top:10px}
.cheer-label{font-size:9px;color:#795548;font-weight:bold}
.cheer-item{font-size:18px;opacity:.2;transition:all .4s ease;filter:grayscale(1)}
.cheer-item.active{opacity:1;filter:none;animation:cheerPop .4s ease}
@keyframes cheerPop{0%{transform:scale(.5)}60%{transform:scale(1.3)}100%{transform:scale(1)}}

/* ── 里程碑 Toast ── */
.milestone-toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:50px;z-index:300;pointer-events:none;
  animation:toastPop 1.2s ease forwards;
  text-shadow:0 0 30px rgba(255,215,0,.8);
}
@keyframes toastPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-70%) scale(1)}}

/* ── 按钮区 ── */
.btn-zone{position:relative;z-index:10;width:100%;height:100px}
.cheer-btn{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#e17055,#d63031);
  color:#fff;font-size:16px;font-weight:900;
  padding:13px 32px;border:none;border-radius:50px;
  box-shadow:0 8px 28px rgba(214,48,49,.5);
  transition:all .15s ease;
  white-space:nowrap;cursor:pointer;
  letter-spacing:1px;z-index:10;
  outline:none;-webkit-appearance:none;
  -webkit-tap-highlight-color:transparent;
}
.cheer-btn.done{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#5D4037}
.cheer-btn:active{transform:translate(-50%,-50%) scale(.92)}

/* ── 消息 ── */
.msg-box{text-align:center;min-height:36px;margin-top:3px;z-index:2;pointer-events:none}
.msg-box .big{font-size:16px;font-weight:900;display:block;margin-bottom:1px;line-height:1.3;color:#2d3436}
.msg-box .sub{font-size:10px;color:#e17055;font-weight:bold}

/* ── 粒子 ── */
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200}
.particle{position:absolute;font-size:18px;animation:flyUp 1s ease-out forwards}
@keyframes flyUp{0%{opacity:1;transform:translateY(0) scale(1) rotate(0)}100%{opacity:0;transform:translateY(-120px) scale(.3) rotate(180deg)}}

/* ── 屏幕闪光 ── */
.screen-flash{animation:scrFlash .4s ease}
@keyframes scrFlash{0%{filter:brightness(1)}50%{filter:brightness(1.8)}100%{filter:brightness(1)}}

/* ── 胜利弹窗 ── */
.win-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);z-index:400;justify-content:center;align-items:center}
.win-overlay.show{display:flex}
.win-dialog{background:linear-gradient(180deg,#fffef5,#fff8e1);border-radius:20px;padding:24px 20px;text-align:center;max-width:320px;width:90%;animation:bounceIn .5s ease;box-shadow:0 20px 60px rgba(0,0,0,.3);border:3px solid #ffd700}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.win-icon{font-size:56px;margin-bottom:10px;animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.win-text{font-size:18px;font-weight:bold;color:#d63031;margin-bottom:8px}
.win-sub{font-size:12px;color:#5D4037;margin-bottom:14px;line-height:1.7;white-space:pre-line}
.win-close{background:#e17055;color:#fff;border:none;padding:11px 30px;border-radius:30px;font-size:15px;font-weight:bold;cursor:pointer;-webkit-appearance:none;outline:none;margin-bottom:8px}
.win-share-hint{font-size:11px;color:#636e72;margin-top:4px}

/* ── 名字弹窗 ── */
.name-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:500;justify-content:center;align-items:center}
.name-overlay.show{display:flex}
.name-dialog{background:#fff;border-radius:18px;padding:24px 20px;text-align:center;max-width:300px;width:88%;animation:bounceIn .5s ease;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.name-dialog .nd-title{font-size:18px;font-weight:900;color:#d63031;margin-bottom:6px}
.name-dialog .nd-sub{font-size:12px;color:#636e72;margin-bottom:14px}
.name-dialog input{width:100%;padding:10px 14px;border:2px solid #e17055;border-radius:25px;font-size:16px;text-align:center;outline:none;margin-bottom:12px;font-family:inherit}
.name-dialog input:focus{border-color:#d63031}
.name-confirm{background:linear-gradient(135deg,#e17055,#d63031);color:#fff;border:none;padding:10px 40px;border-radius:25px;font-size:16px;font-weight:bold;cursor:pointer;-webkit-appearance:none;outline:none}
.name-skip{font-size:12px;color:#b2bec3;margin-top:10px;cursor:pointer}

/* ── 光荣榜弹窗 ── */
.board-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:450;justify-content:center;align-items:center}
.board-overlay.show{display:flex}
.board-dialog{background:#fffef5;border-radius:18px;padding:20px 16px;text-align:center;max-width:340px;width:92%;max-height:70vh;overflow-y:auto;animation:bounceIn .5s ease;box-shadow:0 20px 60px rgba(0,0,0,.3);border:3px solid #ffd700}
.board-dialog .bd-title{font-size:20px;font-weight:900;color:#d63031;margin-bottom:4px}
.board-dialog .bd-sub{font-size:11px;color:#636e72;margin-bottom:12px}
.board-list{text-align:left}
.board-row{display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid #f0e6d3;gap:8px;font-size:13px}
.board-row:last-child{border-bottom:none}
.board-rank{font-size:18px;min-width:28px;text-align:center}
.board-row .br-name{font-weight:bold;color:#2d3436;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.board-row .br-score{color:#e17055;font-weight:bold;min-width:50px;text-align:center}
.board-row .br-combo{color:#0984e3;font-size:11px;min-width:50px;text-align:center}
.board-row .br-time{color:#b2bec3;font-size:10px;min-width:70px;text-align:right}
.board-empty{color:#b2bec3;font-size:13px;padding:20px 0}
.board-close{background:#e17055;color:#fff;border:none;padding:10px 30px;border-radius:25px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:14px;-webkit-appearance:none;outline:none}
.board-clear{font-size:11px;color:#b2bec3;margin-top:8px;cursor:pointer}
</style>
</head>
<body>

<div class="container" id="container">
  <button class="voice-toggle" id="voiceToggle" title="音效开关">🔊</button>
  <div class="wall"></div>

  <div class="blackboard">
    <span class="bb-title">距 离 高 考</span>
    <span class="bb-countdown">最 后 冲 刺</span>
    <span class="bb-sub">—— 江冠铖 加油！——</span>
  </div>

  <!-- 成绩单 -->
  <div class="scoreboard" id="scoreboard">
    <div class="score-item"><span class="score-subject">语文</span><span class="score-value" id="s1">???</span></div>
    <div class="score-item"><span class="score-subject">数学</span><span class="score-value" id="s2">???</span></div>
    <div class="score-item"><span class="score-subject">英语</span><span class="score-value" id="s3">???</span></div>
    <div class="score-item"><span class="score-subject">理综</span><span class="score-value" id="s4">???</span></div>
    <div class="score-total">总分：<span class="st-num" id="stotal">???</span></div>
  </div>

  <div class="player-bar" id="playerBar">
    <span class="player-label">👤 加油人：</span>
    <span class="player-name" id="playerNameDisplay">点击设置</span>
    <button class="player-change" id="playerChange">✏️ 换人</button>
    <button class="leaderboard-toggle" id="boardToggle">🏆 光荣榜</button>
  </div>

  <div class="header">
    <div class="title">🎓 高考加油大作战</div>
    <div class="subtitle">给江冠铖送去最强助威！👇</div>
  </div>

  <div class="hero-zone" id="heroZone">
    <div class="hero-desk" id="heroDesk">
      <div class="desk"></div><div class="paper"></div>
      <div class="hero-body">
        <span class="hero-face" id="heroFace">😰</span>
        <div class="hero-name">江冠铖</div>
        <div class="hero-tag">高考考生</div>
      </div>
      <div class="books">
        <div class="book book1"></div><div class="book book2"></div><div class="book book3"></div>
      </div>
    </div>
    <div class="cheer-bar" id="cheerBar">
      <span class="cheer-label">加油能量：</span>
      <span class="cheer-item" data-idx="0">🐟</span><span class="cheer-item" data-idx="1">💪</span>
      <span class="cheer-item" data-idx="2">⭐</span><span class="cheer-item" data-idx="3">🍀</span>
      <span class="cheer-item" data-idx="4">💯</span><span class="cheer-item" data-idx="5">🎓</span>
    </div>
  </div>

  <div class="btn-zone" id="btnZone">
    <button class="cheer-btn" id="cheerBtn">💪 点击加油</button>
  </div>

  <div class="msg-box" id="msgBox">
    <span class="big">江冠铖看起来好紧张...<br>快点击加油帮他打气！</span>
  </div>
</div>

<div id="particles" class="particles"></div>
<div id="milestoneToast"></div>

<!-- 名字弹窗 -->
<div class="name-overlay show" id="nameOverlay">
  <div class="name-dialog">
    <div class="nd-title">📝 你是谁？</div>
    <div class="nd-sub">留下你的名字，加入助威光荣榜！</div>
    <input type="text" id="nameInput" placeholder="如：江冠铖妈妈" maxlength="12" autocomplete="off"><br>
    <button class="name-confirm" id="nameConfirm">💪 开始加油！</button>
    <div class="name-skip" id="nameSkip">先看看，等会再填</div>
  </div>
</div>

<!-- 光荣榜弹窗 -->
<div class="board-overlay" id="boardOverlay">
  <div class="board-dialog">
    <div class="bd-title">🏆 助威光荣榜</div>
    <div class="bd-sub">感谢每一位为江冠铖加油的人！</div>
    <div class="board-list" id="boardList"><div class="board-empty">还没有人加过油<br>来做第一个吧！💪</div></div>
    <button class="board-close" id="boardClose">关闭</button>
    <div class="board-clear" id="boardClear">清空记录</div>
  </div>
</div>

<!-- 胜利弹窗 -->
<div class="win-overlay" id="winOverlay">
  <div class="win-dialog">
    <div class="win-icon">🎓</div>
    <div class="win-text">加油成功！</div>
    <div class="win-sub" id="winStats"></div>
    <button class="win-close" id="winClose">💪 再来一次</button>
    <div class="win-share-hint">📸 截屏发到群里，让大家看看你的战绩！</div>
  </div>
</div>

<script>
(function(){
var btn=document.getElementById('cheerBtn');
var btnZone=document.getElementById('btnZone');
var heroDesk=document.getElementById('heroDesk');
var heroFace=document.getElementById('heroFace');
var msgBox=document.getElementById('msgBox');
var particlesBox=document.getElementById('particles');
var winOverlay=document.getElementById('winOverlay');
var winStats=document.getElementById('winStats');
var winClose=document.getElementById('winClose');
var container=document.getElementById('container');
var cheerItems=document.querySelectorAll('.cheer-item');
var nameOverlay=document.getElementById('nameOverlay');
var nameInput=document.getElementById('nameInput');
var nameConfirm=document.getElementById('nameConfirm');
var nameSkip=document.getElementById('nameSkip');
var playerNameDisplay=document.getElementById('playerNameDisplay');
var playerChange=document.getElementById('playerChange');
var boardToggle=document.getElementById('boardToggle');
var boardOverlay=document.getElementById('boardOverlay');
var boardList=document.getElementById('boardList');
var boardClose=document.getElementById('boardClose');
var boardClear=document.getElementById('boardClear');
var voiceToggle=document.getElementById('voiceToggle');
var milestoneToast=document.getElementById('milestoneToast');

var attempts=0,done=false,combo=0,maxCombo=0,lastTap=0,currentPlayer='',soundEnabled=true,lastMilestone=0;

// ══════════════════ 音效系统 ══════════════════
// Web Audio API — 简单叮咚声（所有设备通用）
var AudioCtx=window.AudioContext||window.webkitAudioContext;
var audioCtx=null;
function getCtx(){if(!audioCtx){try{audioCtx=new AudioCtx()}catch(e){}}return audioCtx}
function playTone(freq,dur,type,vol,delay){
  if(!soundEnabled)return;
  try{var c=getCtx();if(!c)return;var t=c.currentTime+(delay||0);var o=c.createOscillator();var g=c.createGain();o.type=type||'sine';o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(vol||.15,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur)}catch(e){}
}
function sfxClick(){playTone(800,.08,'sine',.1);playTone(1200,.05,'sine',.06,.03)}
function sfxDodge(){playTone(400,.1,'triangle',.08);playTone(300,.12,'triangle',.06,.05)}
function sfxCheer(){playTone(523,.12,'sine',.18,0);playTone(659,.12,'sine',.16,.08);playTone(784,.18,'sine',.2,.15)}
function sfxFake(){playTone(600,.1,'triangle',.12,0);playTone(400,.15,'triangle',.1,.06);playTone(200,.2,'sawtooth',.04,.12)}
function sfxCombo(n){for(var i=0;i<Math.min(n,5);i++){playTone(600+i*200,.08,'sine',.12,i*.06)}}
function sfxMilestone(){playTone(523,.15,'triangle',.2,0);playTone(659,.15,'triangle',.18,.1);playTone(784,.15,'triangle',.16,.2);playTone(1047,.35,'triangle',.22,.3)}
function sfxVictory(){var notes=[523,659,784,1047,784,1047,1319];for(var i=0;i<notes.length;i++){playTone(notes[i],.2,'triangle',.2,i*.12)}for(var j=0;j<4;j++){playTone(80,.08,'square',.25,j*.4)}setTimeout(function(){playTone(1047,.6,'triangle',.18,0);playTone(1319,.6,'triangle',.15,.1);playTone(1568,.8,'triangle',.12,.2)},800)}

// MP3 语音 — 参考水项目方案，手机/微信可播
var currentAudio=null;
function playAudio(name){
  if(!soundEnabled)return;
  if(currentAudio){currentAudio.pause();currentAudio.src='';currentAudio=null;}
  var a=new Audio();
  a.src='audio/'+name+'.mp3';
  currentAudio=a;
  var played=false;
  var doPlay=function(){if(!played){played=true;a.play().catch(function(){})}};
  a.addEventListener('canplay',doPlay,{once:true});
  a.load();
  a.play().catch(function(){});
}

// ══════════════════ 呐喊气泡 (视觉装饰) ══════════════════

function shout(text,x,y){
  var b=document.createElement('div');
  b.className='shout-bubble';
  b.textContent=text;
  b.style.left=(x||50)+'%';
  b.style.top=(y||40)+'%';
  document.body.appendChild(b);
  setTimeout(function(){b.remove()},2100);
}

function shoutRandom(msgs){
  shout(msgs[Math.floor(Math.random()*msgs.length)],30+Math.random()*40,30+Math.random()*30);
}

  {s1:'???',s2:'???',s3:'???',s4:'???',total:'???'},

];

function updateScoreboard(stage){
  if(stage===lastMilestone)return;
  lastMilestone=stage;
  var s=SCORE_STAGES[stage];
  var els=[document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3'),document.getElementById('s4'),document.getElementById('stotal')];
  var keys=['s1','s2','s3','s4','total'];
  keys.forEach(function(k,i){
    var el=els[i];var prev=el.textContent;var next=s[k];
    if(prev!==next){
      el.textContent=next;el.classList.remove('up','gold');void el.offsetWidth;
      if(next!=='???')el.classList.add('up');
      if(next==='289'||next==='138'||next==='142'||next==='135')el.classList.add('gold');
    }
  });
}

function showMilestoneToast(emoji){
  var t=document.createElement('div');t.className='milestone-toast';t.textContent=emoji;
  milestoneToast.appendChild(t);setTimeout(function(){t.remove()},1300);
}

// ══════════════════ 存储 ══════════════════

function loadRecords(){try{return JSON.parse(localStorage.getItem('cheer_records')||'[]')}catch(e){return[]}}
function saveRecords(r){try{localStorage.setItem('cheer_records',JSON.stringify(r))}catch(e){}}
function loadPlayer(){try{return localStorage.getItem('cheer_player')||''}catch(e){return''}}
function savePlayer(name){currentPlayer=name;try{localStorage.setItem('cheer_player',name)}catch(e){}playerNameDisplay.textContent=name||'匿名'}

function renderBoard(){
  var records=loadRecords();
  if(!records.length){boardList.innerHTML='<div class="board-empty">还没有人加过油<br>来做第一个吧！💪</div>';return}
  records.sort(function(a,b){return b.time-a.time});
  var html='';
  records.forEach(function(r,i){
    var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';var rank=medal||(i+1);
    var d=new Date(r.time);
    var ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    html+='<div class="board-row"><span class="board-rank">'+rank+'</span><span class="br-name">'+esc(r.name||'匿名')+'</span><span class="br-score">💪'+r.attempts+'次</span><span class="br-combo">⚡'+r.maxCombo+'连击</span><span class="br-time">'+ds+'</span></div>';
  });
  boardList.innerHTML=html;
}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function addRecord(name,a,mc){var records=loadRecords();records.push({name:name||'匿名',attempts:a,maxCombo:mc,time:Date.now()});if(records.length>50)records=records.slice(-50);saveRecords(records);renderBoard()}

// ══════════════════ 弹窗事件 ══════════════════

function showNameDialog(){var saved=loadPlayer();nameInput.value=saved||'';nameOverlay.classList.add('show');setTimeout(function(){nameInput.focus()},400)}
function hideNameDialog(){nameOverlay.classList.remove('show')}
nameConfirm.addEventListener('pointerdown',function(e){e.preventDefault();var n=nameInput.value.trim()||'匿名';savePlayer(n);hideNameDialog()});
nameSkip.addEventListener('pointerdown',function(e){e.preventDefault();if(!currentPlayer){savePlayer('匿名')}hideNameDialog()});
playerChange.addEventListener('pointerdown',function(e){e.preventDefault();showNameDialog()});
boardToggle.addEventListener('pointerdown',function(e){e.preventDefault();renderBoard();boardOverlay.classList.add('show')});
boardClose.addEventListener('pointerdown',function(e){e.preventDefault();boardOverlay.classList.remove('show')});
boardClear.addEventListener('pointerdown',function(e){e.preventDefault();if(confirm('确定清空光荣榜吗？此操作不可恢复！')){saveRecords([]);renderBoard()}});
voiceToggle.addEventListener('pointerdown',function(e){e.preventDefault();soundEnabled=!soundEnabled;voiceToggle.textContent=soundEnabled?'🔊':'🔇';if(soundEnabled)sfxClick()});

  '<span style="font-size:38px">😤</span><br>行吧...给江冠铖加了一口油！<br>但我又跑了！',
  '<span style="font-size:38px">😒</span><br>江冠铖收到一罐红牛！<br>继续加啊别停~',
];
var EMOJIS=['💪','⭐','🐟','🎯','💯','📚','✨','🍀','🔥','🏆','💖','🎓'];

// ══════════════════ 核心逻辑 ══════════════════

function updateMsg(html,sub){
  msgBox.innerHTML='<span class="big">'+html+'</span>';
  if(sub)msgBox.innerHTML+=sub;
  else if(attempts>0&&!done){
    var cstr=combo>=3?' | ⚡️'+combo+'连击!':'';
    msgBox.innerHTML+='<span class="sub">已尝试 <b style="font-size:16px">'+attempts+'</b> 次加油 | 成功率 <b>0%</b> 😈'+cstr+'</span>';
  }
}

function spawnParticles(x,y,count){
  count=count||8;
  for(var i=0;i<count;i++){
    var p=document.createElement('span');p.className='particle';
    p.textContent=EMOJIS[i%EMOJIS.length];
    p.style.left=(x+(Math.random()-.5)*90)+'px';p.style.top=y+'px';
    p.style.animationDuration=(.5+Math.random()*1)+'s';
    particlesBox.appendChild(p);setTimeout(function(){p.remove()},1600);
  }
}

function dodge(){
  var w=btnZone.offsetWidth-btn.offsetWidth;
  var h=btnZone.offsetHeight-btn.offsetHeight;
  var x,y;
  if(attempts%7===0){var c=Math.floor(Math.random()*4);if(c===0){x=0;y=0}else if(c===1){x=w;y=0}else if(c===2){x=0;y=h}else{x=w;y=h}}
  else if(attempts%5===0){x=Math.max(0,Math.min(w,parseFloat(btn.style.left||0)+(Math.random()-.5)*w*.3));y=Math.max(0,Math.min(h,parseFloat(btn.style.top||0)+(Math.random()-.5)*h*.3))}
  else{x=Math.random()*w;y=Math.random()*h}
  btn.style.left=x+'px';btn.style.top=y+'px';btn.style.transform='none';
}

function updateFace(){
  var idx=attempts<=4?0:attempts<=9?1:attempts<=14?2:attempts<=19?3:attempts<=22?4:5;
  if(done)idx=6;heroFace.textContent=FACES[idx];
}

function updateCheerBar(){
  var p=done?6:Math.min(6,Math.floor((Math.max(0,attempts-17))/2));
  cheerItems.forEach(function(item,i){if(i<p)item.classList.add('active');else item.classList.remove('active')});
}

function checkMilestone(){
  var stage=0;
  if(attempts>=25)stage=6;else if(attempts>=20)stage=5;else if(attempts>=15)stage=4;else if(attempts>=10)stage=3;else if(attempts>=5)stage=2;else if(attempts>=1)stage=1;
  updateScoreboard(stage);

  if(attempts>0&&attempts%5===0&&attempts<25){
    sfxMilestone();
    speakMilestone(attempts);
    if(attempts===5){showMilestoneToast('📈');setTimeout(function(){shoutRandom(SHOUT_MILESTONE_5)},200)}
    else if(attempts===10){showMilestoneToast('🔥');setTimeout(function(){shoutRandom(SHOUT_MILESTONE_10)},200)}
    else if(attempts===15){showMilestoneToast('⚡');setTimeout(function(){shoutRandom(SHOUT_MILESTONE_15)},200)}
    else if(attempts===20){showMilestoneToast('💎');setTimeout(function(){shoutRandom(SHOUT_MILESTONE_20)},200)}
  }
}

function tryCheer(e){
  e&&e.preventDefault();
  if(done)return;
  if(!currentPlayer){showNameDialog();return}

  attempts++;
  var now=Date.now();
  if(now-lastTap<500){combo++;if(combo>maxCombo)maxCombo=combo}
  else combo=1;
  lastTap=now;

  var rect=btn.getBoundingClientRect();
  spawnParticles(rect.left+rect.width/2,rect.top,combo>=5?14:8);

  sfxClick();  // 每次点击都响

  dodge();
  updateFace();

  var msg='',isFake=attempts===12||attempts===16||attempts===22;

  if(combo&&comboNames[combo]){
    msg='<span style="font-size:38px">'+(combo>=8?'💥':combo>=5?'🔥':'⚡️')+'</span><br>'+comboNames[combo];
    if(combo>=3)sfxCombo(combo);
    if(combo>=5){shout('连击！！'+combo+'连击！！',50,45)}
  }else if(milestones[attempts]){
    msg=milestones[attempts];
  }else if(isFake){
    msg=fakeMsgs[Math.floor(Math.random()*fakeMsgs.length)];
    btn.style.boxShadow='0 0 50px rgba(255,215,0,.9),0 0 100px rgba(255,170,0,.5)';
    setTimeout(function(){btn.style.boxShadow='0 8px 28px rgba(214,48,49,.5)'},600);
    sfxFake();
    setTimeout(function(){shoutRandom(SHOUT_FAKE)},100);
  }else if(attempts>=18&&attempts<25&&attempts%2===0){
    msg=realMsgs[Math.floor(Math.random()*realMsgs.length)];
    sfxCheer();
    setTimeout(function(){shoutRandom(SHOUT_REAL)},100);
    /* 加油音效由 Web Audio 处理 */
  }else{
    if(attempts>3&&Math.random()<.3){msg=tauntsN[Math.floor(Math.random()*tauntsN.length)].replace('{n}',attempts)}
    else{msg=taunts[Math.floor(Math.random()*taunts.length)]}
    sfxDodge();
    if(Math.random()<.2)shout('加油！',30+Math.random()*40,35+Math.random()*20);
  }

  updateMsg(msg);
  updateCheerBar();
  checkMilestone();

  if(attempts%4===0){heroDesk.classList.add('shake');setTimeout(function(){heroDesk.classList.remove('shake')},450)}
  if(attempts===10||attempts===20){container.classList.add('screen-flash');setTimeout(function(){container.classList.remove('screen-flash')},400)}

  if(attempts>=25){
    done=true;
    btn.style.left='50%';btn.style.top='50%';btn.style.transform='translate(-50%,-50%)';
    btn.textContent='✅ 加油成功';btn.classList.add('done');
    heroFace.textContent='🥳';heroFace.classList.add('celebrate');
    updateCheerBar();checkMilestone();
    updateMsg('<span style="font-size:38px">🎉</span><br>江冠铖感受到了力量！<br>你点了 <b style="color:#e17055;font-size:26px">'+attempts+'</b> 次终于加上了！',
      '<span style="color:#00b894;font-size:12px">最高连击: '+maxCombo+'次 | 江冠铖满血复活！</span>');

    sfxVictory();
    playAudio('victory');
    setTimeout(function(){shout('高考必胜！！',50,40)},300);
    setTimeout(function(){shout('金榜题名！！',50,55)},800);
    setTimeout(function(){shout('前程似锦！！',50,45)},1300);

    // 胜利粒子雨
    setTimeout(function(){for(var i=0;i<3;i++){setTimeout(function(){spawnParticles(window.innerWidth/2,window.innerHeight/2,20)},i*400)}},200);

    addRecord(currentPlayer,attempts,maxCombo);
    setTimeout(function(){
      var name=currentPlayer||'好心人';
      winStats.innerHTML='<b style="color:#d63031;font-size:16px">'+name+'</b> 点了 <b style="color:#e17055;font-size:22px">'+attempts+'</b> 次<br>终于给江冠铖加满了油！<br><br>最高连击: <b>'+maxCombo+'</b> 次<br><br>🎉 祝江冠铖高考大捷！<br>💯 金榜题名 · 前程似锦 💯';
      winOverlay.classList.add('show');
    },800);
  }
}

function closeWin(e){
  e&&e.preventDefault();winOverlay.classList.remove('show');
  setTimeout(function(){
    attempts=0;done=false;combo=0;maxCombo=0;lastMilestone=0;
    btn.style.left='50%';btn.style.top='50%';btn.style.transform='translate(-50%,-50%)';
    btn.textContent='💪 点击加油';btn.classList.remove('done');
    btn.style.boxShadow='0 8px 28px rgba(214,48,49,.5)';
    heroFace.textContent='😰';heroFace.classList.remove('celebrate');
    cheerItems.forEach(function(i){i.classList.remove('active')});
    updateScoreboard(0);updateMsg('江冠铖看起来好紧张...<br>快点击加油帮他打气！');
  },400);
}

btn.addEventListener('pointerdown',tryCheer);
winClose.addEventListener('pointerdown',closeWin);

// ══════════════════ 初始化 ══════════════════

currentPlayer=loadPlayer();
if(currentPlayer){playerNameDisplay.textContent=currentPlayer;hideNameDialog()}
else{playerNameDisplay.textContent='点击设置'}
updateScoreboard(0);
updateMsg('江冠铖看起来好紧张...<br>快点击加油帮他打气！');
renderBoard();

// 首次点击时初始化 AudioContext (手机浏览器要求用户交互后才能播放声音)
document.addEventListener('pointerdown',function initAudio(){
  getCtx();if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
},{once:false});
})();
